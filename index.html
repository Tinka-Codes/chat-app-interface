<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="person-selector">
      <button
        class="button person-selector-button active-person"
        id="cyrene-selector"
      >
        Cyrene
      </button>
      <button class="button person-selector-button" id="averye-selector">
        Avery
      </button>
    </div>
    <!--Default chats-->
    <div class="chat-container">
      <h2 class="chat-header">Cyrene chatting...</h2>

      <div class="chat-message">
        <!--Chat from Cyrene-->
        <div class="message pink-hg">
          <div class="message-sender">Cyrene</div>
          <div class="message-text">Hy Avery, are you okay today?</div>
          <div class="message-timestamp">02:15 AM</div>
        </div>
        <!---->
        <!--Chat from Avery-->
        <div class="message grey-hg">
          <div class="message-sender">Avery</div>
          <div class="message-text">
            I don't know, sometimes i feel like my mental health is
            deteriorating
          </div>
          <div class="message-timestamp">02:17 AM</div>
        </div>
        <!---->
      </div>
    </div>
    <!---->
  </body>
</html>
